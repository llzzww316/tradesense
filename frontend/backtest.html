<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSense - 回测</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="shared.js" defer></script>
</head>
<body>
    <div class="header bt-header">
        <div class="logo">TradeSense · 回测</div>
        <div class="controls">
            <!-- 第一行：策略配置 -->
            <div class="bt-row bt-row1">
                <a class="nav-btn" href="/">← 回放</a>
                <select id="bt-symbol" aria-label="品种"></select>
                <select id="bt-contract" disabled aria-label="合约" title="可选合约，留空则使用默认主力合约">
                    <option value="">默认主力</option>
                </select>
                <select id="bt-period" aria-label="周期">
                    <option value="5m" selected>5分钟</option>
                    <option value="15m">15分钟</option>
                    <option value="60m">60分钟</option>
                    <option value="1d">日线</option>
                </select>
                <label>开始 <input type="date" id="bt-start"></label>
                <label>结束 <input type="date" id="bt-end"></label>
                <select id="bt-strategy" aria-label="策略"></select>
                <span id="bt-params" class="bt-params-box"></span>
                <button id="bt-run" class="primary">运行回测</button>
            </div>
            <!-- 第二行：账户参数 -->
            <div class="bt-row bt-row2">
                <label>初始资金 <input id="bt-capital" type="number" value="100000" min="1000" step="1000"></label>
                <label>滑点(跳) <input id="bt-slippage" type="number" value="1" min="0" step="1"></label>
                <label>每跳价格 <input id="bt-tick-size" type="number" step="0.1" placeholder="默认"></label>
                <label>每跳价值 <input id="bt-tick-value" type="number" step="1" placeholder="默认"></label>
                <label>手续费 <input id="bt-fee" type="number" step="0.1" placeholder="默认"></label>
                <label>保证金率 <input id="bt-margin" type="number" step="0.01" min="0" max="1" placeholder="默认"></label>
                <label class="bt-checkbox-label"><input id="bt-intraday" type="checkbox"> 日内强平</label>
            </div>
        </div>
    </div>
    <div class="chart-container bt-charts">
        <div id="bt-chart">
            <div class="chart-empty" id="bt-chart-empty">运行回测后显示 K 线图</div>
        </div>
        <div id="bt-equity-chart">
            <div class="chart-empty" id="bt-equity-empty">运行回测后显示权益曲线</div>
        </div>
        <div class="status hidden" id="bt-status"></div>
    </div>
    <div class="bt-metrics" id="bt-metrics">
        <div class="muted">请先运行回测</div>
    </div>
    <div class="trade-log">
        <div class="trade-log-toolbar">
            <span class="trade-log-title">交易明细</span>
            <button type="button" id="bt-export">导出 CSV</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>开仓时间</th><th>平仓时间</th><th>方向</th><th>手数</th>
                    <th>开仓价</th><th>平仓价</th><th>持仓K数</th>
                    <th>毛盈亏</th><th>手续费</th><th>净盈亏</th>
                    <th>开仓理由</th><th>平仓理由</th>
                </tr>
            </thead>
            <tbody id="bt-trade-body">
                <tr><td colspan="12" class="muted">暂无交易</td></tr>
            </tbody>
        </table>
    </div>
    <script src="backtest.js" defer></script>
</body>
</html>
