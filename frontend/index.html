<!DOCTYPE html>
<!-- 后端 API 根：在 html 上设置 data-api-base，或 localStorage key tradesense_api_base。不设则本机非 8765 端口默认连 :8765，否则走页面同源相对路径。 -->
<html lang="zh" data-api-base="http://172.22.16.1:8765/">
<!-- <html lang="zh"> -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSense - K线回放训练</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="header">
        <div class="logo">TradeSense</div>
        <div class="controls">
            <select id="symbolSelect">
                <option value="">加载中...</option>
            </select>
            <select id="displayPeriod">
                <option value="5m" selected>5分钟</option>
                <option value="1m">1分钟</option>
                <option value="15m">15分钟</option>
                <option value="60m">60分钟</option>
                <option value="1d">日线</option>
            </select>
            <select id="stepPeriod">
                <option value="1m" selected>1分钟</option>
                <option value="5m">5分钟</option>
                <option value="15m">15分钟</option>
                <option value="60m">60分钟</option>
                <option value="1d">日线</option>
            </select>
            <select id="emaPeriod">
                <option value="20" selected>EMA(20)</option>
                <option value="10">EMA(10)</option>
                <option value="60">EMA(60)</option>
            </select>
            <select id="startPosition">
                <option value="20" selected>起始20根</option>
                <option value="40">起始40根</option>
                <option value="60">起始60根</option>
                <option value="100">起始100根</option>
                <option value="all">全部显示</option>
            </select>
            <label class="date-field-label">
                开始: <input type="date" id="startDate" class="date-input">
            </label>
            <label class="date-field-label date-field-label--end">
                结束: <input type="date" id="endDate" class="date-input">
            </label>
            <button id="loadBtn" class="primary">加载数据</button>
        </div>
    </div>

    <div class="chart-container">
        <div id="chart"></div>
        <div class="status hidden" id="status"></div>
        <div id="ohlcDisplay" class="ohlc-display">等待数据...</div>
    </div>

    <div class="replay-bar">
        <button id="prevBtn" disabled>◀ 上一根</button>
        <button id="playBtn" disabled>▶ 播放</button>
        <button id="nextBtn" disabled>下一根 ▶</button>
        <button id="tradeBtn" disabled>交易</button>
        <button id="simSettingsBtn">模拟设置</button>
        <span id="barInfo">0 / 0</span>
        <span class="mode-tag" id="modeTag">5分钟 / 1分钟</span>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <select id="speedSelect" class="speed-select">
            <option value="500">0.5x</option>
            <option value="300" selected>1x</option>
            <option value="150">2x</option>
            <option value="50">5x</option>
        </select>
        <div class="sim-account" id="simAccountBar">
            <div class="sim-pill">权益<strong id="simEquity">10000.00</strong></div>
            <div class="sim-pill">可用<strong id="simAvailable">10000.00</strong></div>
            <div class="sim-pill">持仓<strong id="simPosition">无</strong></div>
            <div class="sim-pill">浮盈<strong id="simUnrealized">0.00</strong></div>
            <div class="sim-pill">已实现<strong id="simRealized">0.00</strong></div>
            <div class="sim-pill">手续费<strong id="simFees">0.00</strong></div>
        </div>
    </div>

    <div class="trade-log" id="tradeLogWrap">
        <div class="trade-log-toolbar">
            <span class="trade-log-title">交易记录</span>
            <button type="button" id="exportTradeLogBtn">导出 TXT</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>时间</th>
                    <th>品种</th>
                    <th>动作</th>
                    <th>价格</th>
                    <th>手数</th>
                    <th>手续费</th>
                    <th>本笔净盈亏</th>
                    <th>权益</th>
                </tr>
            </thead>
            <tbody id="tradeLogBody">
                <tr><td colspan="8" class="muted">暂无交易记录</td></tr>
            </tbody>
        </table>
    </div>

    <div class="modal" id="simSettingsModal">
        <div class="modal-card">
            <div class="modal-title">模拟交易设置</div>
            <div class="form-row">
                <label>初始资金</label>
                <input id="simInitialCapital" type="number" min="1" step="1" value="10000">
            </div>
            <div class="form-row">
                <label>手续费（元/手/次）</label>
                <input id="simFeePerLot" type="number" min="0" step="1" value="20">
            </div>
            <div class="form-row form-row--note">
                <span>说明</span>
                <span>不做保证金，不支持反手。<br>每跳价值：螺纹钢10元，PVC5元。</span>
            </div>
            <div class="modal-actions">
                <button id="simSettingsCancel">取消</button>
                <button id="simSettingsSave" class="primary">重置并应用</button>
            </div>
        </div>
    </div>

    <div class="modal" id="tradeModal">
        <div class="modal-card">
            <div class="modal-title">交易下单</div>
            <div class="form-row"><label>品种</label><strong id="tradeSymbolText">-</strong></div>
            <div class="form-row"><label>当前价</label><strong id="tradePriceText">-</strong></div>
            <div class="form-row"><label>手数</label><input id="tradeQty" type="number" min="1" step="1" value="1"></div>
            <div class="form-row"><label>止损价</label><input id="tradeStopLoss" type="number" step="0.1" placeholder="可选"></div>
            <div class="form-row"><label>止盈价</label><input id="tradeTakeProfit" type="number" step="0.1" placeholder="可选"></div>
            <div class="form-row form-row--note">
                <span></span>
                <span>多：止损低于开仓价、止盈高于开仓价；空则相反。回放步进时按当根 K 线高低点判定；同根触及二者时按止损优先。</span>
            </div>
            <div class="form-row"><label>当前持仓</label><strong id="tradePositionText">无</strong></div>
            <div class="modal-actions modal-actions--split">
                <div class="btn-group">
                    <button id="openLongBtn">开多</button>
                    <button id="openShortBtn">开空</button>
                    <button id="closePositionBtn">平仓</button>
                </div>
                <button id="tradeCancelBtn">关闭</button>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
