<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSense - K线回放训练</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 20px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #e94560;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        select, button {
            padding: 8px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            color: #333;
            cursor: pointer;
            font-size: 14px;
        }
        select:hover, button:hover {
            background: #eee;
        }
        button.primary {
            background: #e94560;
            color: #fff;
            border: none;
        }
        button.primary:hover {
            background: #ff6b6b;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chart-container {
            flex: 1;
            position: relative;
            height: 600px;
        }
        #chart {
            width: 100%;
            height: 600px;
            display: block;
        }
        .replay-bar {
            padding: 10px 20px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #ddd;
        }
        .replay-bar span {
            color: #666;
            font-size: 13px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #e94560;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }
        .speed-select {
            width: 70px;
        }
        .status {
            position: absolute;
            top: 10px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 10;
        }
        .status.hidden {
            display: none;
        }
        .mode-tag {
            background: #e94560;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .sim-account {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #333;
            flex-wrap: wrap;
        }
        .sim-pill {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 16px;
            padding: 4px 10px;
            white-space: nowrap;
        }
        .sim-pill strong {
            color: #e94560;
            margin-left: 4px;
        }
        .trade-log {
            max-height: 180px;
            overflow: auto;
            border-top: 1px solid #ddd;
            background: #fafafa;
            padding: 8px 20px;
            font-size: 13px;
            color: #444;
        }
        .trade-log table {
            width: 100%;
            border-collapse: collapse;
        }
        .trade-log th, .trade-log td {
            border-bottom: 1px solid #eee;
            padding: 6px 4px;
            text-align: left;
        }
        .trade-log th {
            color: #666;
            font-weight: 600;
            position: sticky;
            top: 0;
            background: #fafafa;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.show {
            display: flex;
        }
        .modal-card {
            background: #fff;
            border-radius: 10px;
            min-width: 340px;
            max-width: 92vw;
            padding: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 8px 0;
        }
        .form-row input {
            width: 160px;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        .modal-actions {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TradeSense</div>
        <div class="controls">
            <select id="symbolSelect">
                <option value="">加载中...</option>
            </select>
            <select id="displayPeriod">
                <option value="5m" selected>5分钟</option>
                <option value="1m">1分钟</option>
                <option value="15m">15分钟</option>
                <option value="60m">60分钟</option>
                <option value="1d">日线</option>
            </select>
            <select id="stepPeriod">
                <option value="1m" selected>1分钟</option>
                <option value="5m">5分钟</option>
                <option value="15m">15分钟</option>
                <option value="60m">60分钟</option>
                <option value="1d">日线</option>
            </select>
            <select id="emaPeriod">
                <option value="20" selected>EMA(20)</option>
                <option value="10">EMA(10)</option>
                <option value="60">EMA(60)</option>
            </select>
            <select id="startPosition">
                <option value="20" selected>起始20根</option>
                <option value="40">起始40根</option>
                <option value="60">起始60根</option>
                <option value="100">起始100根</option>
                <option value="all">全部显示</option>
            </select>
            <label style="font-size:14px;margin-left:10px;color:#666;">
                开始: <input type="date" id="startDate" style="background:#fff;border:1px solid #ccc;color:#333;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:6px;border-radius:4px;width:120px;">
            </label>
            <label style="font-size:14px;margin-left:5px;color:#666;">
                结束: <input type="date" id="endDate" style="background:#fff;border:1px solid #ccc;color:#333;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:6px;border-radius:4px;width:120px;">
            </label>
            <button id="loadBtn" class="primary">加载数据</button>
        </div>
    </div>
    
    <div class="chart-container">
        <div id="chart"></div>
        <div class="status hidden" id="status"></div>
        <div id="ohlcDisplay" style="position:absolute;top:10px;right:20px;background:rgba(0,0,0,0.8);color:#fff;padding:8px 14px;border-radius:6px;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Ubuntu,sans-serif;z-index:1000;min-width:200px;box-shadow:0 2px 8px rgba(0,0,0,0.3);">等待数据...</div>
    </div>
    
    <div class="replay-bar">
        <button id="prevBtn" disabled>◀ 上一根</button>
        <button id="playBtn" disabled>▶ 播放</button>
        <button id="nextBtn" disabled>下一根 ▶</button>
        <button id="tradeBtn" disabled>交易</button>
        <button id="simSettingsBtn">模拟设置</button>
        <span id="barInfo">0 / 0</span>
        <span class="mode-tag" id="modeTag">5分钟 / 1分钟</span>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <select id="speedSelect" class="speed-select">
            <option value="500">0.5x</option>
            <option value="300" selected>1x</option>
            <option value="150">2x</option>
            <option value="50">5x</option>
        </select>
        <div class="sim-account" id="simAccountBar">
            <div class="sim-pill">权益<strong id="simEquity">10000.00</strong></div>
            <div class="sim-pill">可用<strong id="simAvailable">10000.00</strong></div>
            <div class="sim-pill">持仓<strong id="simPosition">无</strong></div>
            <div class="sim-pill">浮盈<strong id="simUnrealized">0.00</strong></div>
            <div class="sim-pill">已实现<strong id="simRealized">0.00</strong></div>
            <div class="sim-pill">手续费<strong id="simFees">0.00</strong></div>
        </div>
    </div>

    <div class="trade-log" id="tradeLogWrap">
        <table>
            <thead>
                <tr>
                    <th>时间</th>
                    <th>品种</th>
                    <th>动作</th>
                    <th>价格</th>
                    <th>手数</th>
                    <th>手续费</th>
                    <th>本笔净盈亏</th>
                    <th>权益</th>
                </tr>
            </thead>
            <tbody id="tradeLogBody">
                <tr><td colspan="8" style="color:#999;">暂无交易记录</td></tr>
            </tbody>
        </table>
    </div>

    <div class="modal" id="simSettingsModal">
        <div class="modal-card">
            <div class="modal-title">模拟交易设置</div>
            <div class="form-row">
                <label>初始资金</label>
                <input id="simInitialCapital" type="number" min="1" step="1" value="10000">
            </div>
            <div class="form-row">
                <label>手续费（元/手/次）</label>
                <input id="simFeePerLot" type="number" min="0" step="1" value="20">
            </div>
            <div class="form-row" style="font-size:12px;color:#777;line-height:1.5;align-items:flex-start;">
                <span>说明</span>
                <span>不做保证金，不支持反手。<br>每跳价值：螺纹钢10元，PVC5元。</span>
            </div>
            <div class="modal-actions">
                <button id="simSettingsCancel">取消</button>
                <button id="simSettingsSave" class="primary">重置并应用</button>
            </div>
        </div>
    </div>

    <div class="modal" id="tradeModal">
        <div class="modal-card">
            <div class="modal-title">交易下单</div>
            <div class="form-row"><label>品种</label><strong id="tradeSymbolText">-</strong></div>
            <div class="form-row"><label>当前价</label><strong id="tradePriceText">-</strong></div>
            <div class="form-row"><label>手数</label><input id="tradeQty" type="number" min="1" step="1" value="1"></div>
            <div class="form-row"><label>当前持仓</label><strong id="tradePositionText">无</strong></div>
            <div class="modal-actions" style="justify-content:space-between;">
                <div style="display:flex;gap:8px;">
                    <button id="openLongBtn">开多</button>
                    <button id="openShortBtn">开空</button>
                    <button id="closePositionBtn">平仓</button>
                </div>
                <button id="tradeCancelBtn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chart = null;
        let candleSeries = null;
        let emaLine = null;
        let displayBars = [];      // 显示用K线（5分钟）
        let stepBars = [];         // 步进用K线（1分钟）
        let currentStepIndex = 0;  // 当前步进索引
        let isPlaying = false;
        let playInterval = null;
        
        const API_BASE = "http://localhost:8765";

        // 时间格式化函数（统一用于图表）
        function formatChartTime(time) {
            const d = new Date(time * 1000);
            const yyyy = d.getUTCFullYear();
            const MM = String(d.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(d.getUTCDate()).padStart(2, '0');
            const hh = String(d.getUTCHours()).padStart(2, '0');
            const mm = String(d.getUTCMinutes()).padStart(2, '0');
            return `${yyyy}-${MM}-${dd} ${hh}:${mm}`;
        }

        // 初始化图表
        function initChart() {
            const container = document.getElementById("chart");
            const width = container.clientWidth || 800;
            const height = 600;
            
            chart = LightweightCharts.createChart(container, {
                width: width,
                height: height,
                layout: {
                    background: { type: "solid", color: "#ffffff" },
                    textColor: "#333",
                },
                localization: {
                    timeFormatter: formatChartTime,
                },
                grid: {
                    vertLines: { color: "#eee" },
                    horzLines: { color: "#eee" },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: {
                        labelBackgroundColor: "#e94560",
                    },
                    horzLine: {
                        labelBackgroundColor: "#e94560",
                    },
                },
                timeScale: {
                    timeVisible: true,
                    secondsVisible: false,
                    tickMarkFormatter: formatChartTime,
                },
                rightPriceScale: {
                    borderColor: "#333",
                },
                crosshairTimeFormatter: formatChartTime,
            });
            
            candleSeries = chart.addCandlestickSeries({
                upColor: "#ef5350",
                downColor: "#26a69a",
                borderUpColor: "#ef5350",
                borderDownColor: "#26a69a",
                wickUpColor: "#ef5350",
                wickDownColor: "#26a69a",
            });
            
            emaLine = chart.addLineSeries({
                color: "#ff9800",
                lineWidth: 2,
            });
            
            window.addEventListener("resize", () => {
                const w = container.clientWidth || 800;
                chart.resize(w, 600);
            });
            
            // 订阅十字线移动事件，显示OHLC
            chart.subscribeCrosshairMove((param) => {
                const ohlcEl = document.getElementById("ohlcDisplay");

                // 如果鼠标不在图表上，清除显示
                if (!param.point || !param.time) {
                    ohlcEl.style.display = "none";
                    return;
                }

                // 使用 param.seriesData.get() 获取当前K线数据
                let data = null;
                try {
                    data = param.seriesData.get(candleSeries);
                } catch (e) {
                    ohlcEl.style.display = "none";
                    return;
                }

                if (!data) {
                    ohlcEl.style.display = "none";
                    return;
                }

                const timeStr = formatChartTime(data.time);
                ohlcEl.innerHTML = `${timeStr} | <span style="color:#f0ad4e">O:${data.open}</span> <span style="color:#ef5350">H:${data.high}</span> <span style="color:#26a69a">L:${data.low}</span> <span style="color:#4fc3f7">C:${data.close}</span>`;
                ohlcEl.style.display = "block";
            });
        }

        // 初始化日期选择器（默认最近30天）
        function initDatePickers() {
            const today = new Date();
            const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
            
            document.getElementById("endDate").value = today.toISOString().split('T')[0];
            document.getElementById("startDate").value = thirtyDaysAgo.toISOString().split('T')[0];
        }
        
        // 初始化品种列表（从后端获取）
        async function initSymbolList() {
            try {
                const res = await fetch(`${API_BASE}/symbols`);
                const data = await res.json();
                const select = document.getElementById("symbolSelect");
                select.innerHTML = "";
                
                if (data.symbols) {
                    for (const [name, info] of Object.entries(data.symbols)) {
                        const code = info.code || info;
                        const tickValue = info.tick_value || 10;
                        const option = document.createElement("option");
                        option.value = name;
                        option.textContent = `${name} (${code})`;
                        select.appendChild(option);
                        // 更新每跳价值
                        TICK_VALUE[name] = tickValue;
                    }
                }
            } catch (e) {
                console.warn("加载品种列表失败:", e);
                // 使用默认列表
                const select = document.getElementById("symbolSelect");
                select.innerHTML = `
                    <option value="螺纹钢">螺纹钢 (SHFE.rb2610)</option>
                    <option value="热卷">热卷 (SHFE.hc2610)</option>
                    <option value="PVC">PVC (DCE.v2609)</option>
                    <option value="纯碱">纯碱 (ZCE.SA2509)</option>
                `;
                TICK_VALUE = {"螺纹钢": 10, "热卷": 10, "PVC": 5, "纯碱": 20};
            }
        }
        
        // 加载回放数据（显示周期 + 步进周期）
        async function loadData() {
            const symbol = document.getElementById("symbolSelect").value.trim();
            if (!symbol) {
                alert("请输入品种名称或代码");
                return;
            }
            const displayPeriod = document.getElementById("displayPeriod").value;
            const stepPeriod = document.getElementById("stepPeriod").value;
            const emaPeriod = document.getElementById("emaPeriod").value;
            const startDate = document.getElementById("startDate").value;
            const endDate = document.getElementById("endDate").value;
            
            document.getElementById("status").textContent = "加载回放数据...";
            document.getElementById("status").classList.remove("hidden");
            
            try {
                let url = `${API_BASE}/replay_data?symbol=${encodeURIComponent(symbol)}` +
                    `&display_period=${displayPeriod}&step_period=${stepPeriod}` +
                    `&count=2000&ma_period=${emaPeriod}`;
                
                if (startDate) url += `&start_date=${startDate}`;
                if (endDate) url += `&end_date=${endDate}`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                displayBars = data.display;
                stepBars = data.step;
                
                // 更新模式标签
                document.getElementById("modeTag").textContent =
                    `${displayPeriod} / ${stepPeriod}`;
                
                // 初始显示：根据下拉选择设定起始位置
                const startPosSelect = document.getElementById("startPosition");
                const startPosValue = startPosSelect.value;
                if (startPosValue === "all") {
                    currentStepIndex = stepBars.length - 1; // 最末尾，即全部已加载
                } else {
                    const N = parseInt(startPosValue);
                    currentStepIndex = Math.min(N, stepBars.length - 1);
                }
                updateChart();
                updateUI();
                
                document.getElementById("status").classList.add("hidden");
                
                // 启用按钮
                document.getElementById("prevBtn").disabled = false;
                document.getElementById("playBtn").disabled = false;
                document.getElementById("nextBtn").disabled = false;
                
            } catch (e) {
                document.getElementById("status").textContent = "加载失败: " + e.message;
                console.error(e);
            }
        }

        // 根据步进索引计算当前显示的K线
        function getCurrentDisplayBars() {
            if (displayBars.length === 0) return [];
            
            if (stepBars.length === 0) {
                // 没有步进数据时，返回所有显示K线
                return displayBars;
            }
            
            // 返回所有显示K线（始终显示全部历史）
            return displayBars;
        }

        // 转换时间格式为Lightweight Charts需要的Unix时间戳（秒）
        // 时间字符串格式: "2026-03-25 13:35:00" (北京时间 UTC+8)
        function toChartTime(timeStr) {
            // 手动解析日期字符串
            const parts = timeStr.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
            if (parts) {
                const [, yyyy, MM, dd, hh, mm, ss] = parts.map(Number);
                // 直接用北京时间创建UTC时间戳
                // Date.UTC returns milliseconds, divide by 1000 for seconds
                return Math.floor(Date.UTC(yyyy, MM - 1, dd, hh, mm, ss) / 1000);
            }
            const date = new Date(timeStr);
            return Math.floor(date.getTime() / 1000);
        }

        // 更新图表
        function updateChart() {
            if (displayBars.length === 0) return;
            
            if (stepBars.length === 0) {
                // 无步进数据时，直接显示所有历史K线
                const candleData = displayBars.map(bar => ({
                    time: toChartTime(bar.time),
                    open: bar.open,
                    high: bar.high,
                    low: bar.low,
                    close: bar.close,
                }));
                candleSeries.setData(candleData);
                emaLine.setData(displayBars.filter(bar => bar.ema).map(bar => ({
                    time: toChartTime(bar.time),
                    value: bar.ema,
                })));
                chart.timeScale().scrollToRealTime();
                return;
            }
            
            // 有步进数据时的逻辑：
            // 1. 已完成的5分钟K线：直接用原始数据
            // 2. 当前正在形成的5分钟K线：基于1分钟数据实时计算
            
            const currentStep = stepBars[currentStepIndex];
            const currentStepTime = currentStep.time;
            
            // 找到当前1分钟所属的5分钟K线索引
            let currentDisplayIndex = 0;
            for (let i = displayBars.length - 1; i >= 0; i--) {
                if (displayBars[i].time <= currentStepTime) {
                    currentDisplayIndex = i;
                    break;
                }
            }
            
            // 分离：已完成的K线 + 当前K线
            const completedBars = displayBars.slice(0, currentDisplayIndex);
            const currentBar = displayBars[currentDisplayIndex];
            const currentBarTime = currentBar.time;
            
            // 计算当前5分钟K线从开始到当前1分钟步进的OHLC
            let high = currentBar.open;
            let low = currentBar.open;
            let close = currentStep.close;
            
            for (let i = 0; i <= currentStepIndex; i++) {
                const t = stepBars[i].time;
                if (t >= currentBarTime && t <= currentStepTime) {
                    high = Math.max(high, stepBars[i].high);
                    low = Math.min(low, stepBars[i].low);
                }
            }
            
            // 构建完整K线数据
            const candleData = completedBars.map(bar => ({
                time: toChartTime(bar.time),
                open: bar.open,
                high: bar.high,
                low: bar.low,
                close: bar.close,
            }));
            
            // 添加当前正在形成的K线
            candleData.push({
                time: toChartTime(currentBarTime),
                open: currentBar.open,
                high: high,
                low: low,
                close: close,
            });
            
            candleSeries.setData(candleData);
            
            // EMA（只用已完成的K线）
            emaLine.setData(completedBars.filter(bar => bar.ema).map(bar => ({
                time: toChartTime(bar.time),
                value: bar.ema,
            })));
            
            chart.timeScale().scrollToRealTime();
        }

        // 更新UI状态
        function updateUI() {
            document.getElementById("barInfo").textContent =
                `${currentStepIndex + 1} / ${stepBars.length} | ${getCurrentDisplayIndex() + 1} / ${displayBars.length}`;
            
            const progress = stepBars.length > 0 ? ((currentStepIndex + 1) / stepBars.length) * 100 : 0;
            document.getElementById("progressFill").style.width = `${progress}%`;
            
            document.getElementById("prevBtn").disabled = currentStepIndex === 0;
            document.getElementById("nextBtn").disabled = currentStepIndex >= stepBars.length - 1;
            
            const playBtn = document.getElementById("playBtn");
            playBtn.textContent = isPlaying ? "⏸ 暂停" : "▶ 播放";
        }

        function getCurrentDisplayIndex() {
            if (stepBars.length === 0 || displayBars.length === 0) return 0;
            const currentStepTime = stepBars[currentStepIndex].time;
            for (let i = 0; i < displayBars.length; i++) {
                if (displayBars[i].time <= currentStepTime) {
                    if (i === displayBars.length - 1) return i;
                } else {
                    return i - 1;
                }
            }
            return displayBars.length - 1;
        }

        // 播放控制
        function play() {
            if (isPlaying) {
                stopPlay();
                return;
            }
            
            if (currentStepIndex >= stepBars.length - 1) {
                currentStepIndex = 0;
            }
            
            isPlaying = true;
            const speed = parseInt(document.getElementById("speedSelect").value);
            
            playInterval = setInterval(() => {
                currentStepIndex++;
                if (currentStepIndex >= stepBars.length - 1) {
                    stopPlay();
                    return;
                }
                updateChart();
                updateUI();
                updateSimAccountOnStep();
            }, speed);
            
            updateUI();
        }

        function stopPlay() {
            isPlaying = false;
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
            updateUI();
        }

        // 步进控制
        function prevStep() {
            if (currentStepIndex > 0) {
                stopPlay();
                currentStepIndex--;
                updateChart();
                updateUI();
                updateSimAccountOnStep();
            }
        }

        function nextStep() {
            if (currentStepIndex < stepBars.length - 1) {
                stopPlay();
                currentStepIndex++;
                updateChart();
                updateUI();
                updateSimAccountOnStep();
            }
        }

        // ==================== 模拟交易模块 ====================

        // 每跳价值（从后端动态加载）
        let TICK_VALUE = {};

        // 模拟账户状态
        let simAccount = {
            initialCapital: 10000,
            feePerLot: 20,
            equity: 10000,
            available: 10000,
            position: null, // { direction: "long"|"short", qty: number, avgPrice: number }
            realized: 0,
            fees: 0,
            tradeLogs: [],
        };

        // 从 localStorage 加载账户
        function loadSimAccount() {
            try {
                const saved = localStorage.getItem("tradesense_sim_account");
                if (saved) {
                    const parsed = JSON.parse(saved);
                    simAccount = { ...simAccount, ...parsed };
                }
            } catch (e) {
                console.warn("加载模拟账户失败:", e);
            }
            // 始终用当前持仓价格计算浮盈
            recalculateEquity();
            updateSimAccountBar();
            renderTradeLog();
        }

        // 保存账户到 localStorage
        function saveSimAccount() {
            try {
                localStorage.setItem("tradesense_sim_account", JSON.stringify(simAccount));
            } catch (e) {
                console.warn("保存模拟账户失败:", e);
            }
        }

        // 重置账户（重新开始）
        function resetSimAccount(initialCapital, feePerLot) {
            simAccount = {
                initialCapital: initialCapital,
                feePerLot: feePerLot,
                equity: initialCapital,
                available: initialCapital,
                position: null,
                realized: 0,
                fees: 0,
                tradeLogs: [],
            };
            saveSimAccount();
            updateSimAccountBar();
            renderTradeLog();
        }

        // 获取当前价格（当前步进K线的收盘价）
        function getCurrentPrice() {
            if (stepBars.length === 0) return null;
            return stepBars[currentStepIndex].close;
        }

        // 获取当前品种
        function getCurrentSymbol() {
            const symbol = document.getElementById("symbolSelect").value.trim();
            return symbol || "螺纹钢";
        }

        // 计算浮盈
        function calculateUnrealizedPnl() {
            if (!simAccount.position) return 0;
            const currentPrice = getCurrentPrice();
            if (currentPrice === null) return 0;
            const pos = simAccount.position;
            const tickValue = TICK_VALUE[getCurrentSymbol()] || 10;
            const pnl = (currentPrice - pos.avgPrice) * pos.qty * tickValue;
            return pos.direction === "short" ? -pnl : pnl;
        }

        // 重新计算权益（权益 = 可用 + 浮盈）
        function recalculateEquity() {
            const unrealized = calculateUnrealizedPnl();
            simAccount.equity = simAccount.available + unrealized;
        }

        // 更新顶部状态栏
        function updateSimAccountBar() {
            const unrealized = calculateUnrealizedPnl();
            document.getElementById("simEquity").textContent = simAccount.equity.toFixed(2);
            document.getElementById("simAvailable").textContent = simAccount.available.toFixed(2);
            const pos = simAccount.position;
            if (pos) {
                const dirText = pos.direction === "long" ? "多" : "空";
                document.getElementById("simPosition").textContent = `${dirText}${pos.qty}手 @ ${pos.avgPrice.toFixed(1)}`;
            } else {
                document.getElementById("simPosition").textContent = "无";
            }
            document.getElementById("simUnrealized").textContent = unrealized.toFixed(2);
            document.getElementById("simRealized").textContent = simAccount.realized.toFixed(2);
            document.getElementById("simFees").textContent = simAccount.fees.toFixed(2);
        }

        // 记录交易日志
        function addTradeLog(action, price, qty, fee, netPnl) {
            const symbol = getCurrentSymbol();
            const time = stepBars.length > 0 ? stepBars[currentStepIndex].time : new Date().toLocaleString();
            simAccount.tradeLogs.unshift({
                time,
                symbol,
                action,
                price,
                qty,
                fee,
                netPnl,
                equity: simAccount.equity,
            });
            // 最多保留100条
            if (simAccount.tradeLogs.length > 100) {
                simAccount.tradeLogs.pop();
            }
        }

        // 渲染交易日志表格
        function renderTradeLog() {
            const tbody = document.getElementById("tradeLogBody");
            if (simAccount.tradeLogs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="color:#999;">暂无交易记录</td></tr>';
                return;
            }
            tbody.innerHTML = simAccount.tradeLogs.map(log => {
                const pnlColor = log.netPnl >= 0 ? '#ef5350' : '#26a69a';
                return `<tr>
                    <td>${log.time}</td>
                    <td>${log.symbol}</td>
                    <td>${log.action}</td>
                    <td>${log.price}</td>
                    <td>${log.qty}</td>
                    <td>${log.fee.toFixed(2)}</td>
                    <td style="color:${pnlColor};">${log.netPnl.toFixed(2)}</td>
                    <td>${log.equity.toFixed(2)}</td>
                </tr>`;
            }).join("");
        }

        // 交易模态框
        function openTradeModal() {
            const symbol = getCurrentSymbol();
            const price = getCurrentPrice();
            const pos = simAccount.position;
            document.getElementById("tradeSymbolText").textContent = symbol;
            document.getElementById("tradePriceText").textContent = price !== null ? price.toFixed(1) : "-";
            document.getElementById("tradeQty").value = 1;
            document.getElementById("tradePositionText").textContent =
                pos ? `${pos.direction === "long" ? "多" : "空"} ${pos.qty}手 @ ${pos.avgPrice.toFixed(1)}` : "无";
            document.getElementById("tradeModal").classList.add("show");
        }

        function closeTradeModal() {
            document.getElementById("tradeModal").classList.remove("show");
        }

        // 开多
        function openLong() {
            const price = getCurrentPrice();
            if (price === null) return;
            const qty = parseInt(document.getElementById("tradeQty").value) || 1;
            const fee = simAccount.feePerLot * qty;

            if (simAccount.position) {
                alert("当前已有持仓，请先平仓！");
                return;
            }
            if (simAccount.available < fee) {
                alert("可用资金不足支付手续费！");
                return;
            }

            simAccount.position = { direction: "long", qty: qty, avgPrice: price };
            simAccount.available -= fee;
            simAccount.fees += fee;
            recalculateEquity();
            addTradeLog("开多", price, qty, fee, -fee);
            saveSimAccount();
            updateSimAccountBar();
            renderTradeLog();
            closeTradeModal();
        }

        // 开空
        function openShort() {
            const price = getCurrentPrice();
            if (price === null) return;
            const qty = parseInt(document.getElementById("tradeQty").value) || 1;
            const fee = simAccount.feePerLot * qty;

            if (simAccount.position) {
                alert("当前已有持仓，请先平仓！");
                return;
            }
            if (simAccount.available < fee) {
                alert("可用资金不足支付手续费！");
                return;
            }

            simAccount.position = { direction: "short", qty: qty, avgPrice: price };
            simAccount.available -= fee;
            simAccount.fees += fee;
            recalculateEquity();
            addTradeLog("开空", price, qty, fee, -fee);
            saveSimAccount();
            updateSimAccountBar();
            renderTradeLog();
            closeTradeModal();
        }

        // 平仓
        function closePosition() {
            const price = getCurrentPrice();
            if (price === null || !simAccount.position) return;
            const pos = simAccount.position;
            const qty = pos.qty;
            const fee = simAccount.feePerLot * qty;
            const tickValue = TICK_VALUE[getCurrentSymbol()] || 10;
            const pnl = (price - pos.avgPrice) * qty * tickValue;
            const grossPnl = pos.direction === "short" ? -pnl : pnl;

            const realizedPnl = grossPnl - fee;
            simAccount.available += realizedPnl;
            simAccount.realized += realizedPnl;
            simAccount.fees += fee;
            simAccount.position = null;
            recalculateEquity();
            addTradeLog("平仓", price, qty, fee, realizedPnl);
            saveSimAccount();
            updateSimAccountBar();
            renderTradeLog();
            closeTradeModal();
        }

        // 模拟设置模态框
        function openSimSettingsModal() {
            document.getElementById("simInitialCapital").value = simAccount.initialCapital;
            document.getElementById("simFeePerLot").value = simAccount.feePerLot;
            document.getElementById("simSettingsModal").classList.add("show");
        }

        function closeSimSettingsModal() {
            document.getElementById("simSettingsModal").classList.remove("show");
        }

        function saveSimSettings() {
            const initialCapital = parseFloat(document.getElementById("simInitialCapital").value) || 10000;
            const feePerLot = parseFloat(document.getElementById("simFeePerLot").value) || 20;
            resetSimAccount(initialCapital, feePerLot);
            closeSimSettingsModal();
        }

        // 回放步进时更新权益显示
        function updateSimAccountOnStep() {
            recalculateEquity();
            updateSimAccountBar();
        }

        // ==================== 事件绑定 ====================

        document.getElementById("loadBtn").addEventListener("click", () => {
            loadData().then(() => {
                // 数据加载成功后启用交易按钮
                document.getElementById("tradeBtn").disabled = false;
            });
        });
        document.getElementById("prevBtn").addEventListener("click", prevStep);
        document.getElementById("nextBtn").addEventListener("click", nextStep);
        document.getElementById("playBtn").addEventListener("click", play);

        // 交易按钮
        document.getElementById("tradeBtn").addEventListener("click", openTradeModal);
        document.getElementById("openLongBtn").addEventListener("click", openLong);
        document.getElementById("openShortBtn").addEventListener("click", openShort);
        document.getElementById("closePositionBtn").addEventListener("click", closePosition);
        document.getElementById("tradeCancelBtn").addEventListener("click", closeTradeModal);

        // 模拟设置
        document.getElementById("simSettingsBtn").addEventListener("click", openSimSettingsModal);
        document.getElementById("simSettingsCancel").addEventListener("click", closeSimSettingsModal);
        document.getElementById("simSettingsSave").addEventListener("click", saveSimSettings);

        // 进度条点击
        document.getElementById("progressBar").addEventListener("click", (e) => {
            if (stepBars.length === 0) return;
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const ratio = x / rect.width;
            const newIndex = Math.floor(ratio * stepBars.length);
            stopPlay();
            currentStepIndex = Math.max(0, Math.min(newIndex, stepBars.length - 1));
            updateChart();
            updateUI();
            updateSimAccountOnStep();
        });

        // 键盘快捷键
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") {
                prevStep();
            } else if (e.key === "ArrowRight") {
                nextStep();
            } else if (e.key === " ") {
                e.preventDefault();
                play();
            }
        });

        // 初始化
        initChart();
        initDatePickers();
        initSymbolList();
        loadSimAccount();
    </script>
</body>
</html>
